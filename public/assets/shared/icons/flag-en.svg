<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 40">
  <!-- Background: blue -->
  <rect width="60" height="40" fill="#012169"/>
  <!-- White diagonal crosses (St Andrew + St Patrick) -->
  <path d="M0,0 L60,40 M60,0 L0,40" stroke="#fff" stroke-width="8"/>
  <path d="M0,0 L60,40 M60,0 L0,40" stroke="#C8102E" stroke-width="5"/>
  <!-- White vertical + horizontal cross (St George base) -->
  <path d="M30,0 V40 M0,20 H60" stroke="#fff" stroke-width="13.3"/>
  <!-- Red vertical + horizontal cross (St George) -->
  <path d="M30,0 V40 M0,20 H60" stroke="#C8102E" stroke-width="8"/>
</svg>
